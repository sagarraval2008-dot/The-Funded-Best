<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — The Funded Best</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#378ADD;--blue-dark:#185FA5;--blue-glow:rgba(55,138,221,.18);
  --green:#1D9E75;--red:#e05252;
  --bg:#07090f;--bg2:rgba(13,18,32,.95);
  --border:rgba(255,255,255,.08);--border-blue:rgba(55,138,221,.35);
  --text:#f0f4ff;--muted:rgba(240,244,255,.5);
  --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;
  --radius:14px;--radius-sm:10px;
}
body{
  margin:0;background:var(--bg);font-family:var(--font-body);color:var(--text);
  display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;
  background-image:
    radial-gradient(ellipse 70% 50% at 50% 0%,rgba(55,138,221,.1) 0%,transparent 70%),
    radial-gradient(ellipse 40% 40% at 90% 80%,rgba(29,158,117,.05) 0%,transparent 60%);
  overflow-x:hidden;
}

/* ANIMATED BACKGROUND ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:float 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:rgba(55,138,221,.06);top:-100px;left:-100px;animation-delay:0s}
.orb2{width:300px;height:300px;background:rgba(29,158,117,.05);bottom:-50px;right:-50px;animation-delay:-4s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}

.wrapper{width:100%;max-width:440px;position:relative;z-index:1;animation:slideUp .5s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* LOGO */
.logo{text-align:center;margin-bottom:24px}
.logo-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:52px;height:52px;background:var(--blue);border-radius:14px;
  font-family:var(--font-display);font-size:18px;font-weight:700;color:#fff;
  box-shadow:0 0 40px rgba(55,138,221,.5);margin-bottom:10px;
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(55,138,221,.5)}50%{box-shadow:0 0 60px rgba(55,138,221,.8)}}
.logo-name{font-family:var(--font-display);font-size:20px;font-weight:700}

/* CARD */
.card{
  background:var(--bg2);backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:24px;padding:36px;
  box-shadow:0 0 100px rgba(55,138,221,.1),0 40px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
}
.card h2{font-family:var(--font-display);font-size:22px;text-align:center;margin-bottom:6px}
.card .subtitle{text-align:center;font-size:13px;color:var(--muted);margin-bottom:28px}

/* FIELDS */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:500;letter-spacing:.02em;text-transform:uppercase}
.field-wrap{position:relative}
.field input{
  width:100%;padding:13px 44px 13px 16px;border-radius:var(--radius-sm);
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  color:var(--text);font-size:15px;font-family:var(--font-body);
  transition:border-color .2s,box-shadow .2s,background .2s;outline:none;
}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(55,138,221,.12);background:rgba(55,138,221,.03)}
.field input.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(224,82,82,.1)}
.field-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.toggle-pass{cursor:pointer;pointer-events:all!important;transition:color .15s}
.toggle-pass:hover{color:var(--text)}
.error-msg{font-size:12px;color:var(--red);margin-top:6px;display:none;animation:shake .3s ease}
.error-msg.show{display:block}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

.field-footer{display:flex;justify-content:flex-end;margin-bottom:22px}
.link{font-size:13px;color:var(--blue);text-decoration:none;transition:opacity .15s}
.link:hover{opacity:.75}

/* BUTTON */
.btn-primary{
  width:100%;padding:14px;border:none;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--blue),var(--blue-dark));
  color:#fff;font-size:15px;font-weight:600;font-family:var(--font-body);cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.btn-primary::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);
  opacity:0;transition:opacity .2s;
}
.btn-primary:hover:not(:disabled)::before{opacity:1}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 28px rgba(55,138,221,.4)}
.btn-primary:active:not(:disabled){transform:translateY(0)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}

/* DIVIDER */
.divider{text-align:center;margin:20px 0;color:var(--muted);font-size:12px;
  display:flex;align-items:center;gap:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* GOOGLE */
.btn-google{
  width:100%;padding:13px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:rgba(255,255,255,.03);color:var(--text);font-size:14px;font-family:var(--font-body);
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .2s;
}
.btn-google:hover{border-color:var(--border-blue);background:rgba(55,138,221,.06);transform:translateY(-1px)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}

.bottom{text-align:center;margin-top:20px;font-size:14px;color:var(--muted)}
.bottom a{color:var(--blue);text-decoration:none;font-weight:500}
.bottom a:hover{text-decoration:underline}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1a2235;border:1px solid var(--border-blue);border-radius:var(--radius-sm);
  padding:12px 20px;font-size:13px;color:var(--text);
  transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:999;white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.red{border-color:var(--red);background:#1f1215}
.toast.green{border-color:var(--green);background:#0f1e18}

/* SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOADING OVERLAY */
.auth-loading{
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .3s;
}
.auth-loading.hide{opacity:0;pointer-events:none}
.auth-loading-inner{text-align:center}
.auth-loading-spinner{width:36px;height:36px;border:3px solid rgba(55,138,221,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.auth-loading-text{font-size:13px;color:var(--muted)}
</style>
</head>
<body>

<!-- Auth loading screen — shown until Firebase resolves -->
<div class="auth-loading" id="authLoading">
  <div class="auth-loading-inner">
    <div class="auth-loading-spinner"></div>
    <div class="auth-loading-text">Checking session…</div>
  </div>
</div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrapper" id="mainContent" style="display:none">
  <div class="logo">
    <div class="logo-mark">FB</div>
    <div class="logo-name">The Funded Best</div>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your trading account</p>

    <div class="field">
      <label>Email address</label>
      <div class="field-wrap">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
        <span class="field-icon ti ti-mail"></span>
      </div>
      <div class="error-msg" id="emailErr">Please enter a valid email.</div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
        <span class="field-icon ti ti-eye toggle-pass" id="eyeIcon" onclick="togglePass()"></span>
      </div>
      <div class="error-msg" id="passErr">Password must be at least 6 characters.</div>
    </div>

    <div class="field-footer">
      <a href="#" class="link" onclick="sendReset(event)">Forgot password?</a>
    </div>

    <button class="btn-primary" id="signInBtn" onclick="signIn()">Sign In</button>

    <div class="divider">OR</div>

    <button class="btn-google" onclick="signInGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 32.4 29.4 35 24 35c-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.3 1 7.2 2.7l5.7-5.7C33.5 7.1 29 5 24 5 13.5 5 5 13.5 5 24s8.5 19 19 19c10.5 0 18-7.6 18-18.3 0-1.2-.1-2.4-.4-4.7z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16 19 13 24 13c2.8 0 5.3 1 7.2 2.7l5.7-5.7C33.5 7.1 29 5 24 5c-7.4 0-13.8 4-17.7 9.7z"/><path fill="#4CAF50" d="M24 43c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 34.5 27 35.5 24 35.5c-5.3 0-9.8-3.5-11.3-8.3l-6.5 5C9.7 39.2 16.4 43 24 43z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.2-2.3 4-4.2 5.2l6.2 5.2C40.6 35.3 44 30.1 44 24c0-1.2-.1-2.4-.4-4z"/></svg>
      Continue with Google
    </button>

    <div class="bottom">New here? <a href="signup.html">Create your free account →</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── KEY FIX: resolve auth state BEFORE showing UI ──
auth.onAuthStateChanged(user => {
  const loader = document.getElementById('authLoading');
  const main   = document.getElementById('mainContent');
  if (user) {
    // Already logged in → redirect immediately
    const redirectTo = sessionStorage.getItem('fb_redirect_after_login') || 'dashboard.html';
    sessionStorage.removeItem('fb_redirect_after_login');
    window.location.replace(redirectTo);
    return;
  }
  // Not logged in → hide loader, show form
  loader.classList.add('hide');
  setTimeout(() => { loader.style.display = 'none'; main.style.display = ''; }, 300);
});

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function setLoading(loading) {
  const btn = document.getElementById('signInBtn');
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>Signing in…' : 'Sign In';
}

let passVisible = false;
function togglePass() {
  passVisible = !passVisible;
  document.getElementById('password').type = passVisible ? 'text' : 'password';
  document.getElementById('eyeIcon').className = passVisible ? 'field-icon ti ti-eye-off toggle-pass' : 'field-icon ti ti-eye toggle-pass';
}

function validate() {
  let ok = true;
  const email = document.getElementById('email');
  const pass  = document.getElementById('password');
  const eErr  = document.getElementById('emailErr');
  const pErr  = document.getElementById('passErr');
  [email, pass].forEach(el => el.classList.remove('error'));
  [eErr, pErr].forEach(el => el.classList.remove('show'));
  if (!/\S+@\S+\.\S+/.test(email.value.trim())) { email.classList.add('error'); eErr.classList.add('show'); ok = false; }
  if (pass.value.length < 6) { pass.classList.add('error'); pErr.classList.add('show'); ok = false; }
  return ok;
}

async function signIn() {
  if (!validate()) return;
  setLoading(true);
  try {
    const cred = await auth.signInWithEmailAndPassword(
      document.getElementById('email').value.trim(),
      document.getElementById('password').value
    );
    await db.collection('users').doc(cred.user.uid).set({
      name: cred.user.displayName || '',
      email: cred.user.email || '',
      lastLogin: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    // onAuthStateChanged will redirect
  } catch (err) {
    setLoading(false);
    const msgs = {
      'auth/user-not-found':     '❌ No account found with this email.',
      'auth/wrong-password':     '❌ Incorrect password. Try again.',
      'auth/too-many-requests':  '⏳ Too many attempts. Try again later.',
      'auth/invalid-credential': '❌ No account found. Please sign up first.',
      'auth/invalid-email':      '❌ Please enter a valid email address.',
    };
    showToast(msgs[err.code] || err.message, 'red');
  }
}

async function signInGoogle() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const cred = await auth.signInWithPopup(provider);
    await db.collection('users').doc(cred.user.uid).set({
      name: cred.user.displayName || '',
      email: cred.user.email || '',
      photoURL: cred.user.photoURL || '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      lastLogin: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  } catch (err) {
    showToast(err.message, 'red');
  }
}

async function sendReset(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) { showToast('Enter your email first, then click Forgot password.', 'red'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showToast('✓ Password reset email sent — check your inbox.', 'green');
  } catch (err) {
    showToast(err.message, 'red');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
</script>
</body>
</html>
